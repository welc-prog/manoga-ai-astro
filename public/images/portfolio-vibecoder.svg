<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="25%" style="stop-color:#ec4899"/>
      <stop offset="50%" style="stop-color:#f59e0b"/>
      <stop offset="75%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" rx="16" fill="#0f0f11"/>
  <rect x="0" y="0" width="800" height="6" rx="3" fill="url(#wave)"/>
  <text x="400" y="155" text-anchor="middle" fill="white" font-family="system-ui,-apple-system,sans-serif" font-size="42" font-weight="800">The <tspan fill="url(#bg)">Vibecoder</tspan> Dictionary</text>
  <text x="400" y="210" text-anchor="middle" fill="#a1a1aa" font-family="system-ui,-apple-system,sans-serif" font-size="20">1900+ dev terms explained like you're five</text>
  <g transform="translate(200,250)">
    <rect width="90" height="32" rx="16" fill="#7c3aed" opacity="0.2"/>
    <text x="45" y="21" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="13" font-weight="600">ELI5</text>
  </g>
  <g transform="translate(310,250)">
    <rect width="90" height="32" rx="16" fill="#ec4899" opacity="0.2"/>
    <text x="45" y="21" text-anchor="middle" fill="#f472b6" font-family="monospace" font-size="13" font-weight="600">A-Z</text>
  </g>
  <g transform="translate(420,250)">
    <rect width="90" height="32" rx="16" fill="#10b981" opacity="0.2"/>
    <text x="45" y="21" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="13" font-weight="600">Code</text>
  </g>
  <g transform="translate(530,250)">
    <rect width="90" height="32" rx="16" fill="#3b82f6" opacity="0.2"/>
    <text x="45" y="21" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="13" font-weight="600">Vibes</text>
  </g>
  <text x="400" y="340" text-anchor="middle" fill="#71717a" font-family="system-ui,-apple-system,sans-serif" font-size="14">vibecodersdictionary.com</text>
