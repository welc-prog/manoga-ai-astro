<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg-cc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="50%" stop-color="#0e0e16"/>
      <stop offset="100%" stop-color="#12121a"/>
    </linearGradient>
    <radialGradient id="glow-cc" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4a574" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#d4a574" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent-cc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d4a574" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#d4a574" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="timeline-cc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d4a574"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6b8aed"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-cc)"/>

  <!-- Subtle grid overlay -->
  <g opacity="0.02">
    <pattern id="grid-cc" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.5"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#grid-cc)"/>
  </g>

  <!-- Geometric decorations -->
  <circle cx="200" cy="300" r="200" fill="url(#glow-cc)" opacity="0.06"/>
  <circle cx="1000" cy="400" r="220" fill="url(#glow-cc)" opacity="0.04"/>
  <line x1="800" y1="0" x2="600" y2="630" stroke="#d4a574" stroke-width="1" opacity="0.03"/>
  <line x1="860" y1="0" x2="660" y2="630" stroke="#d4a574" stroke-width="1" opacity="0.04"/>
  <line x1="920" y1="0" x2="720" y2="630" stroke="#d4a574" stroke-width="1" opacity="0.05"/>
  <line x1="980" y1="0" x2="780" y2="630" stroke="#d4a574" stroke-width="1" opacity="0.06"/>
  <line x1="1040" y1="0" x2="840" y2="630" stroke="#d4a574" stroke-width="1" opacity="0.07"/>
  <line x1="1100" y1="0" x2="900" y2="630" stroke="#d4a574" stroke-width="1" opacity="0.08"/>

  <!-- Accent line -->
  <line x1="80" y1="570" x2="380" y2="570" stroke="#d4a574" stroke-width="2" opacity="0.3"/>
  <circle cx="80" cy="555" r="2" fill="#d4a574" opacity="0.4"/>
  <circle cx="88" cy="555" r="2" fill="#d4a574" opacity="0.4"/>
  <circle cx="96" cy="555" r="2" fill="#d4a574" opacity="0.4"/>

  <!-- Category icon: Claude Code terminal -->
  <g transform="translate(970, 70) scale(0.8)" opacity="0.15">
    <rect x="10" y="10" width="90" height="70" rx="8" fill="none" stroke="#d4a574" stroke-width="3"/>
    <text x="30" y="50" font-family="monospace" font-size="24" fill="#d4a574">$_</text>
    <circle cx="25" cy="25" r="4" fill="#d4a574"/>
    <circle cx="40" cy="25" r="4" fill="#d4a574"/>
    <circle cx="55" cy="25" r="4" fill="#d4a574"/>
  </g>

  <!-- Timeline visualization -->
  <line x1="100" y1="400" x2="1100" y2="400" stroke="url(#timeline-cc)" stroke-width="3" opacity="0.3"/>

  <!-- Jan node -->
  <circle cx="250" cy="400" r="10" fill="#d4a574" opacity="0.6"/>
  <text x="250" y="440" text-anchor="middle" font-family="monospace" font-size="14" fill="#d4a574" opacity="0.7">JAN</text>
  <text x="250" y="380" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#9993a4">Cowork &bull; MCP Apps</text>

  <!-- Feb node -->
  <circle cx="550" cy="400" r="14" fill="#8b5cf6" opacity="0.6"/>
  <text x="550" y="440" text-anchor="middle" font-family="monospace" font-size="14" fill="#8b5cf6" opacity="0.7">FEB</text>
  <text x="550" y="380" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#9993a4">Opus 4.6 &bull; Sonnet 4.6</text>

  <!-- Mar node -->
  <circle cx="850" cy="400" r="16" fill="#6b8aed" opacity="0.6"/>
  <text x="850" y="440" text-anchor="middle" font-family="monospace" font-size="14" fill="#6b8aed" opacity="0.7">MAR</text>
  <text x="850" y="380" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#9993a4">Auto Mode &bull; Computer Use</text>

  <!-- Future node -->
  <circle cx="1050" cy="400" r="8" fill="none" stroke="#6b8aed" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.4"/>

  <!-- Title -->
  <text x="80" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="#e8e6e3" letter-spacing="-1">Claude in 2026</text>
  <text x="80" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="30" font-weight="400" fill="#9993a4">Everything Anthropic Shipped in Q1</text>

  <!-- Stats -->
  <text x="80" y="310" font-family="monospace" font-size="16" fill="#d4a574" opacity="0.8">60+ releases &bull; 2 new models &bull; 1M context &bull; 15+ hook events</text>

  <!-- Badge -->
  <rect x="80" y="90" width="180" height="32" rx="16" fill="#d4a574" fill-opacity="0.1" stroke="#d4a574" stroke-opacity="0.3"/>
  <text x="170" y="112" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#d4a574" letter-spacing="1.5">Q1 2026 RETROSPECTIVE</text>

  <!-- manoga.digital -->
  <text x="80" y="600" font-family="system-ui, sans-serif" font-size="14" fill="#6b6580">manoga.digital</text>
</svg>
