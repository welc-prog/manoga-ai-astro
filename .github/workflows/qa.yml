name: QA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: qa-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Lint, Typecheck & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npx astro check
      - name: Build
        run: npm run build

  no-suppressions:
    name: No Suppressions
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Check for eslint-disable comments
        run: |
          if grep -rn "eslint-disable" src/ api/ --include="*.ts" --include="*.astro" --include="*.js" --include="*.mjs" 2>/dev/null; then
            echo "::error::eslint-disable comments found. Fix the issues instead of suppressing them."
            exit 1
          fi
      - name: Check for TypeScript suppressions
        run: |
          if grep -rn "@ts-ignore\|@ts-expect-error\|@ts-nocheck" src/ api/ --include="*.ts" --include="*.astro" --include="*.js" --include="*.mjs" 2>/dev/null; then
            echo "::error::TypeScript suppression comments found. Fix the type issues instead."
            exit 1
          fi
